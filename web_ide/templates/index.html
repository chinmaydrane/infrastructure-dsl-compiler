<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure DSL Playground</title>
    
    <!-- Monaco Editor -->
    <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Infrastructure DSL Playground</h1>
            <div class="header-actions">
                <button id="compileBtn" class="compile-btn">Compile</button>
                <button id="clearBtn" class="clear-btn">Clear</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel - Editor -->
            <section class="editor-panel">
                <div class="panel-header">
                    <h2>DSL Code</h2>
                    <div class="editor-info">
                        <span id="lineCount">Lines: 0</span>
                        <span id="charCount">Chars: 0</span>
                    </div>
                </div>
                <div class="editor-container">
                    <div id="editor"></div>
                </div>
            </section>

            <!-- Right Panel - Output -->
            <section class="output-panel">
                <div class="panel-header">
                    <h2>JSON Output</h2>
                    <div class="output-info">
                        <span id="outputStatus">Ready</span>
                        <button id="copyBtn" class="copy-btn" style="display: none;">Copy JSON</button>
                    </div>
                </div>
                <div class="output-container">
                    <div id="output" class="output-content"></div>
                </div>
            </section>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Compiling...</p>
            </div>
        </div>

        <!-- Error Modal -->
        <div id="errorModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Compilation Error</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div id="errorMessage"></div>
                    <div id="errorDetails"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
